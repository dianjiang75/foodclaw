<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodClaw — Dish Photo Approval Tool</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e5e5e5; }

  .header { position: sticky; top: 0; z-index: 100; background: #111; border-bottom: 1px solid #333; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header .stats { font-size: 13px; color: #888; }
  .header .stats span { color: #22c55e; font-weight: 600; }
  .header .actions { display: flex; gap: 8px; }
  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
  .btn-primary { background: #22c55e; color: #000; }
  .btn-primary:hover { background: #16a34a; }
  .btn-secondary { background: #333; color: #e5e5e5; }
  .btn-secondary:hover { background: #444; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 11px; }

  .filters { padding: 8px 20px; background: #111; border-bottom: 1px solid #222; display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; border: 1px solid #333; background: transparent; color: #888; cursor: pointer; }
  .filter-pill.active { background: #22c55e20; border-color: #22c55e; color: #22c55e; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; padding: 20px; }

  .card { background: #181818; border-radius: 12px; overflow: hidden; border: 2px solid transparent; transition: border-color 0.2s; }
  .card.approved { border-color: #22c55e; }
  .card.rejected { border-color: #ef4444; }
  .card.pending { border-color: #333; }

  .card-photo { aspect-ratio: 3/2; width: 100%; position: relative; overflow: hidden; background: #222; }
  .card-photo img { width: 100%; height: 100%; object-fit: cover; }
  .card-photo .no-photo { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 13px; }
  .card-photo .badge { position: absolute; top: 8px; right: 8px; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
  .badge.approved { background: #22c55e; color: #000; }
  .badge.rejected { background: #ef4444; color: #fff; }
  .badge.pending { background: #555; color: #fff; }
  .card-photo .index { position: absolute; top: 8px; left: 8px; background: #000a; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }

  .card-info { padding: 12px; }
  .card-info h3 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .card-info .restaurant { font-size: 11px; color: #888; margin-bottom: 4px; }
  .card-info .description { font-size: 11px; color: #666; line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-info .cuisine { font-size: 10px; color: #22c55e; font-weight: 600; margin-bottom: 8px; }

  .card-actions { display: flex; gap: 6px; margin-bottom: 8px; }

  .url-input { width: 100%; padding: 6px 10px; border-radius: 6px; border: 1px solid #333; background: #111; color: #e5e5e5; font-size: 11px; outline: none; }
  .url-input:focus { border-color: #22c55e; }
  .url-input::placeholder { color: #555; }

  .search-links { display: flex; gap: 6px; margin-top: 6px; }
  .search-link { font-size: 10px; color: #6366f1; text-decoration: none; padding: 3px 8px; border-radius: 4px; background: #6366f115; cursor: pointer; }
  .search-link:hover { background: #6366f130; }

  .candidates { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 8px; }
  .candidates img { width: 100%; aspect-ratio: 3/2; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
  .candidates img:hover { border-color: #6366f1; transform: scale(1.02); }
  .candidates img.selected { border-color: #22c55e; box-shadow: 0 0 0 1px #22c55e; }
  .candidates .loading { grid-column: 1/-1; text-align: center; padding: 12px; color: #555; font-size: 11px; }
  .candidates .error { grid-column: 1/-1; text-align: center; padding: 8px; color: #ef4444; font-size: 11px; }

  .export-modal { display: none; position: fixed; inset: 0; z-index: 200; background: #000c; backdrop-filter: blur(4px); align-items: center; justify-content: center; }
  .export-modal.open { display: flex; }
  .export-content { background: #181818; border-radius: 16px; padding: 24px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; }
  .export-content h2 { margin-bottom: 12px; }
  .export-content pre { background: #111; padding: 12px; border-radius: 8px; font-size: 11px; overflow-x: auto; white-space: pre-wrap; max-height: 50vh; overflow-y: auto; }
  .export-content .close { float: right; cursor: pointer; font-size: 20px; color: #888; }

  .progress-bar { height: 3px; background: #222; }
  .progress-bar .fill { height: 100%; background: #22c55e; transition: width 0.3s; }
</style>
</head>
<body>

<div class="header">
  <h1>FoodClaw Photo Approval</h1>
  <div class="stats">
    <span id="approvedCount">0</span> approved ·
    <span id="rejectedCount" style="color:#ef4444">0</span> rejected ·
    <span id="pendingCount">0</span> pending ·
    <span id="totalCount">0</span> total
  </div>
  <div class="actions">
    <button class="btn btn-secondary" onclick="searchAllDishes()">🔍 Search All</button>
    <button class="btn btn-secondary" onclick="approveAllWithPhotos()">Approve All With Photos</button>
    <button class="btn btn-primary" onclick="showExport()">Export JSON</button>
    <button class="btn btn-secondary" onclick="loadSaved()">Load Saved</button>
  </div>
</div>
<div class="progress-bar"><div class="fill" id="progressFill"></div></div>

<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>

<div class="export-modal" id="exportModal">
  <div class="export-content">
    <span class="close" onclick="closeExport()">&times;</span>
    <h2>Export Approved Photos</h2>
    <p style="font-size:12px;color:#888;margin-bottom:12px;">Copy this JSON and paste into scripts/approved-photos.json</p>
    <pre id="exportJson"></pre>
    <div style="margin-top:12px;display:flex;gap:8px;">
      <button class="btn btn-primary" onclick="copyExport()">Copy to Clipboard</button>
      <button class="btn btn-secondary" onclick="downloadExport()">Download JSON</button>
    </div>
  </div>
</div>

<script>
// Dish data will be loaded from the API or embedded
let DISHES = [];
let state = {}; // { "Dish Name": { status: "approved"|"rejected"|"pending", url: "..." } }

async function init() {
  DISHES = EMBEDDED_DISHES;

  // Load saved state from localStorage
  const saved = localStorage.getItem('foodclaw_photo_approval');
  if (saved) state = JSON.parse(saved);

  // Try loading suggested photos from approved-photos.json (generated by suggest-photos script)
  try {
    const res = await fetch('/admin/approved-photos.json');
    if (res.ok) {
      const suggestions = await res.json();
      // Apply suggestions as "pending" photos (not auto-approved — user must review)
      Object.entries(suggestions).forEach(([name, url]) => {
        const dish = DISHES.find(d => d.name === name);
        if (dish) {
          const key = dish.name + '|' + dish.restaurant;
          if (!state[key] || !state[key].url) {
            state[key] = { status: 'pending', url: url };
          }
        }
      });
    }
  } catch {}

  // Initialize any dishes not in state
  DISHES.forEach((d, i) => {
    const key = d.name + '|' + d.restaurant;
    if (!state[key]) {
      state[key] = { status: 'pending', url: '' };
    }
  });

  renderFilters();
  renderGrid();
  updateStats();

  // Auto-search for pending dishes on load
  setTimeout(() => autoSearchPending(), 500);
}

function renderFilters() {
  const cuisines = [...new Set(DISHES.map(d => d.cuisine))].sort();
  const statuses = ['all', 'pending', 'approved', 'rejected'];
  const el = document.getElementById('filters');

  el.innerHTML = statuses.map(s =>
    `<button class="filter-pill ${s === 'all' ? 'active' : ''}" data-filter="${s}" onclick="filterBy('${s}', this)">${s} (${s === 'all' ? DISHES.length : DISHES.filter(d => getState(d).status === s).length})</button>`
  ).join('') + cuisines.map(c =>
    `<button class="filter-pill" data-cuisine="${c}" onclick="filterByCuisine('${c}', this)">${c}</button>`
  ).join('');
}

let currentFilter = 'all';
let currentCuisine = null;

function filterBy(status, btn) {
  currentFilter = status;
  currentCuisine = null;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function filterByCuisine(cuisine, btn) {
  currentCuisine = cuisine;
  currentFilter = 'all';
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function getState(dish) {
  const key = dish.name + '|' + dish.restaurant;
  return state[key] || { status: 'pending', url: '' };
}

function setState(dish, newState) {
  const key = dish.name + '|' + dish.restaurant;
  state[key] = { ...state[key], ...newState };
  save();
  updateStats();
}

function save() {
  localStorage.setItem('foodclaw_photo_approval', JSON.stringify(state));
}

function renderGrid() {
  const grid = document.getElementById('grid');
  let filtered = DISHES;

  if (currentFilter !== 'all') {
    filtered = filtered.filter(d => getState(d).status === currentFilter);
  }
  if (currentCuisine) {
    filtered = filtered.filter(d => d.cuisine === currentCuisine);
  }

  grid.innerHTML = filtered.map((dish, i) => {
    const s = getState(dish);
    const globalIdx = DISHES.indexOf(dish);
    const searchQ = encodeURIComponent(dish.name + ' ' + dish.cuisine + ' ' + dish.restaurant + ' food');
    const unsplashQ = encodeURIComponent(dish.name + ' food');
    const pexelsQ = encodeURIComponent(dish.name + ' dish');

    return `
    <div class="card ${s.status}" id="card-${globalIdx}">
      <div class="card-photo">
        <span class="index">#${globalIdx + 1}</span>
        ${s.url ? `<img src="${s.url}" alt="${dish.name}" onerror="this.parentElement.innerHTML='<div class=no-photo>Image failed to load</div>'" loading="lazy">` : '<div class="no-photo">No photo</div>'}
        <span class="badge ${s.status}">${s.status}</span>
      </div>
      <div class="card-info">
        <h3>${dish.name}</h3>
        <div class="restaurant">${dish.restaurant}</div>
        <div class="cuisine">${dish.cuisine}</div>
        <div class="description">${dish.description}</div>

        <div class="card-actions">
          <button class="btn btn-sm ${s.status === 'approved' ? 'btn-primary' : 'btn-secondary'}" onclick="approve(${globalIdx})">✓ Approve</button>
          <button class="btn btn-sm ${s.status === 'rejected' ? 'btn-danger' : 'btn-secondary'}" onclick="reject(${globalIdx})">✗ Reject</button>
          <button class="btn btn-sm btn-secondary" onclick="searchImages(${globalIdx})">🔍 Find Photos</button>
        </div>

        <div class="candidates" id="candidates-${globalIdx}"></div>

        <input class="url-input"
          placeholder="Paste new image URL here..."
          value="${s.url || ''}"
          onchange="updateUrl(${globalIdx}, this.value)"
          onpaste="setTimeout(() => updateUrl(${globalIdx}, this.value), 50)"
        >

        <div class="search-links">
          <a class="search-link" href="https://www.google.com/search?q=${searchQ}&tbm=isch&tbs=isz:l" target="_blank">Google</a>
          <span class="search-link" onclick="searchImages(${globalIdx})">Auto-Search</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function approve(idx) {
  setState(DISHES[idx], { status: 'approved' });
  updateCard(idx);
}

function reject(idx) {
  setState(DISHES[idx], { status: 'rejected' });
  updateCard(idx);
}

function updateUrl(idx, url) {
  url = url.trim();
  setState(DISHES[idx], { url, status: url ? 'approved' : 'pending' });
  updateCard(idx);
}

function updateCard(idx) {
  const card = document.getElementById(`card-${idx}`);
  if (card) {
    const s = getState(DISHES[idx]);
    card.className = `card ${s.status}`;
    const badge = card.querySelector('.badge');
    if (badge) { badge.className = `badge ${s.status}`; badge.textContent = s.status; }
    const img = card.querySelector('.card-photo img');
    if (img && s.url) img.src = s.url;
  }
  renderFilters();
}

function updateStats() {
  const counts = { approved: 0, rejected: 0, pending: 0 };
  DISHES.forEach(d => { counts[getState(d).status]++; });
  document.getElementById('approvedCount').textContent = counts.approved;
  document.getElementById('rejectedCount').textContent = counts.rejected;
  document.getElementById('pendingCount').textContent = counts.pending;
  document.getElementById('totalCount').textContent = DISHES.length;
  document.getElementById('progressFill').style.width = `${(counts.approved / DISHES.length) * 100}%`;
}

function approveAllWithPhotos() {
  DISHES.forEach((d, i) => {
    const s = getState(d);
    if (s.url && s.status === 'pending') {
      setState(d, { status: 'approved' });
    }
  });
  renderGrid();
  renderFilters();
}

function showExport() {
  const approved = {};
  DISHES.forEach(d => {
    const s = getState(d);
    if (s.status === 'approved' && s.url) {
      approved[d.name] = s.url;
    }
  });
  document.getElementById('exportJson').textContent = JSON.stringify(approved, null, 2);
  document.getElementById('exportModal').classList.add('open');
}

function closeExport() {
  document.getElementById('exportModal').classList.remove('open');
}

function copyExport() {
  const text = document.getElementById('exportJson').textContent;
  navigator.clipboard.writeText(text);
  alert('Copied to clipboard!');
}

function downloadExport() {
  const text = document.getElementById('exportJson').textContent;
  const blob = new Blob([text], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'approved-photos.json'; a.click();
  URL.revokeObjectURL(url);
}

// Image search via Bing proxy API
async function searchImages(idx) {
  const dish = DISHES[idx];
  const container = document.getElementById(`candidates-${idx}`);
  if (!container) return;

  // Toggle: if already showing results, hide them
  if (container.children.length > 0 && !container.querySelector('.loading')) {
    container.innerHTML = '';
    return;
  }

  container.innerHTML = '<div class="loading">Searching for photos...</div>';

  try {
    const q = encodeURIComponent(dish.name + ' ' + dish.cuisine + ' ' + dish.restaurant);
    const res = await fetch(`/api/admin/image-search?q=${q}&limit=8`);
    const data = await res.json();

    if (!data.images || data.images.length === 0) {
      container.innerHTML = '<div class="error">No results. Try pasting a URL manually.</div>';
      return;
    }

    container.innerHTML = data.images.map((img, i) =>
      `<img src="${img.url}" alt="Option ${i+1}" loading="lazy" onclick="selectCandidate(${idx}, '${img.url.replace(/'/g, "\\'")}')" onerror="this.style.display='none'" title="Click to select">`
    ).join('');
  } catch (err) {
    container.innerHTML = '<div class="error">Search failed: ' + err.message + '</div>';
  }
}

function selectCandidate(idx, url) {
  // Highlight selected thumbnail
  const container = document.getElementById(`candidates-${idx}`);
  if (container) {
    container.querySelectorAll('img').forEach(img => img.classList.remove('selected'));
    const selected = container.querySelector(`img[src="${CSS.escape ? url : url}"]`);
    if (selected) selected.classList.add('selected');
  }

  // Update the URL input and auto-approve
  const card = document.getElementById(`card-${idx}`);
  if (card) {
    const input = card.querySelector('.url-input');
    if (input) input.value = url;
  }
  setState(DISHES[idx], { url, status: 'approved' });
  updateCard(idx);
}

// Search ALL dishes (triggered by Search All button)
async function searchAllDishes() {
  for (let i = 0; i < DISHES.length; i++) {
    const container = document.getElementById(`candidates-${i}`);
    if (container && container.children.length > 0 && !container.querySelector('.loading')) continue; // skip already searched
    await searchImages(i);
    await new Promise(r => setTimeout(r, 400));
  }
}

// Auto-search for dishes that don't have photos yet
async function autoSearchPending() {
  const pending = DISHES.map((d, i) => ({ dish: d, idx: i }))
    .filter(({ dish }) => {
      const s = getState(dish);
      return !s.url || s.status === 'pending';
    });

  // Search first 6 pending dishes automatically (to avoid overwhelming the API)
  for (let i = 0; i < Math.min(pending.length, 6); i++) {
    await searchImages(pending[i].idx);
    await new Promise(r => setTimeout(r, 500)); // small delay between requests
  }
}

function loadSaved() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    const text = await file.text();
    const data = JSON.parse(text);
    // data is { "Dish Name": "url" }
    Object.entries(data).forEach(([name, url]) => {
      const dish = DISHES.find(d => d.name === name);
      if (dish) setState(dish, { url, status: 'approved' });
    });
    renderGrid();
    renderFilters();
  };
  input.click();
}
